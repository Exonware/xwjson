[pytest]
# Pytest configuration for xwjson

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Markers
markers =
    xwjson_core: Fast, high-value core checks (80/20)
    xwjson_unit: Fine-grained per-module tests
    xwjson_integration: Cross-module scenario tests
    xwjson_advance: Advance quality tests (v1.0.0+)
    xwjson_security: Security excellence tests (Priority #1)
    xwjson_usability: Usability excellence tests (Priority #2)
    xwjson_maintainability: Maintainability excellence tests (Priority #3)
    xwjson_performance: Performance excellence tests (Priority #4)
    xwjson_extensibility: Extensibility excellence tests (Priority #5)
    xwjson_serialization: Serialization format tests
    xwjson_lazy: Lazy loading tests
    xwjson_references: Reference resolution tests
    xwjson_encoder: Encoder/decoder tests
    xwjson_operations: Operations tests

# Output options
# ⚠️ CRITICAL: Following GUIDE_TEST.md - no forbidden flags
# ❌ FORBIDDEN: --disable-warnings (hides real problems)
# ✅ ALLOWED: -v, --tb=short, --strict-markers, -x (stop on first failure)
addopts =
    -v
    --strict-markers
    --tb=short
    -x

# Encoding (Windows compatibility)
# Note: UTF-8 is default, but explicitly set for Windows
[coverage:run]
source = src
omit = 
    */tests/*
    */__pycache__/*
