# Source size (src/*): ~229.6 KB
[build-system]
requires = [
    "hatchling",
]
build-backend = "hatchling.build"

[project]
name = "xwjson"
dynamic = [
    "version",
]
description = "Convenience wrapper for exonware-xwjson - provides 'import xwjson' alias"
readme = "README.md"
requires-python = ">=3.12"
keywords = []
classifiers = []
dependencies = [
    "exonware-xwjson",
]
authors = [
    { name = "eXonware Backend Team", email = "connect@exonware.com" },
]

[project.license]
text = "MIT"

[project.optional-dependencies]
lazy = [
    "exonware-xwjson[lazy]",
]
dev = [
    "exonware-xwjson[dev]",
]
full = [
    "exonware-xwjson[full]",
]

[project.urls]
Homepage = "https://exonware.com"
Repository = "https://github.com/exonware/xwjson"
Documentation = "https://github.com/exonware/xwjson#readme"
Subtree = "https://github.com/exonware/xwjson.git"

[tool.hatch.version]
path = "src/exonware/xwjson/version.py"

[tool.hatch.build.targets.wheel]
only-include = [
    "README.md",
    "src/xwjson_wrapper.py",
]

[tool.hatch.build.targets.sdist]
include = [
    "/src",
    "/tests",
    "/README.md",
    "/.github",
]
